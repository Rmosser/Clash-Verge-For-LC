  <body>
    <h1>公共服务域名异常</h1>
    <p>该检查会验证 LazyCat 公共服务域名是否能完成解析并建立 TCP 连接，例如下载、应用发现和应用商店相关入口。</p>
    <p>若该项持续异常，请检查本地 DNS、出口网络和透明代理规则是否误伤了这些公共服务域名。</p>
