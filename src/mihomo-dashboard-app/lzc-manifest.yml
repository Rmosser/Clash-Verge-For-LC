name: Clash Verge For LC
package: cloud.lazycat.app.clash-verge-for-lc
version: 0.2.0
description: Clash Verge Rev web port for Mihomo (Clash Meta), proxied via LazyCat.
license: https://choosealicense.com/licenses/mit/
homepage:
author:
application:
  subdomain: clash
  routes:
    # Proxy Mihomo controller API from the ingress container to the host network.
    # NOTE: keep the trailing slash so LazyCat trims the prefix correctly:
    # /api/v1 -> http://host.lzcapp:9090/v1
    - /api/=http://host.lzcapp:9090
    - /verge-api/=http://host.lzcapp:9091
    # Same-origin fetch proxy for subscription YAML to bypass browser CORS.
    - /fetch/=http://fetchproxy:3001
    # Static UI (packed into the LPK).
    - /=file:///lzcapp/pkg/content/

services:
  fetchproxy:
    image: registry.lazycat.cloud/node:18-alpine
    command: node /lzcapp/pkg/content/lzcapp-fetch-proxy.js
    environment:
      - PORT=3001
      - TIMEOUT_MS=25000
      - MAX_BYTES=12582912
      - VERGE_API_BASE=http://host.lzcapp:9091
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3001/healthz >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
