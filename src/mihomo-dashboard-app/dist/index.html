<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mihomo Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <div class="brand__title">Mihomo Dashboard</div>
        <div class="brand__sub">Switch proxy groups quickly (Clash Meta API)</div>
      </div>
      <div class="actions">
        <label class="secret">
          <span class="secret__label">Secret</span>
          <input id="secret" class="secret__input" type="password" placeholder="optional" autocomplete="off" />
        </label>
        <button id="saveSecret" class="btn" type="button">Save</button>
        <button id="refresh" class="btn btn--primary" type="button">Refresh</button>
      </div>
    </header>

    <main class="main">
      <section class="status">
        <div id="status" class="status__text">Loading…</div>
      </section>

      <section class="grid">
        <div id="groups" class="groups"></div>
      </section>
    </main>

    <template id="groupTpl">
      <article class="card">
        <div class="card__head">
          <div>
            <div class="card__title"></div>
            <div class="card__meta"></div>
          </div>
          <div class="card__headActions">
            <button class="btn btn--ghost js-testNow" type="button">Test now</button>
          </div>
        </div>
        <div class="card__body">
          <div class="row">
            <div class="row__label">Now</div>
            <div class="row__value js-now"></div>
          </div>
          <div class="row">
            <div class="row__label">Select</div>
            <div class="row__value">
              <select class="select js-select"></select>
            </div>
          </div>
          <div class="row">
            <div class="row__label">Delay</div>
            <div class="row__value js-delay">-</div>
          </div>
          <div class="row row--hint js-hint"></div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
