services:
  mihomo:
    image: ${MIHOMO_IMAGE:-metacubex/mihomo:latest}
    container_name: mihomo
    restart: unless-stopped
    command: ["-d", "/var/lib/mihomo", "-f", "/etc/mihomo/config.yaml"]

    # Required for host-wide TUN + policy routing.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun

    volumes:
      - ./config.yaml:/etc/mihomo/config.yaml:ro
      - ./data:/var/lib/mihomo

    # Optional but commonly needed for TUN setups.
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
